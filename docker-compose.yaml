services:
  # 1. KAFKA - Apache official image (KRaft mode)
  # 1. KAFKA - Apache official image (KRaft mode)
  kafka:
    image: apache/kafka:3.7.0
    container_name: taasim-kafka
    ports:
      - "9092:9092"
      - "9094:9094" 
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094 #The "Advertised Listener" is the contact information Kafka hands out to anyone who wants to talk to it
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data  

  # 2. CASSANDRA
  cassandra:
    image: cassandra:4.1
    container_name: taasim-cassandra
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=TaaSimCluster
      - CASSANDRA_DC=Casablanca
      - CASSANDRA_RACK=Rack1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe cluster"]
      interval: 15s
      timeout: 30s
      retries: 5
    volumes:
      - cassandra_data:/var/lib/cassandra  

  # 2b. CASSANDRA INITIALIZATION
  cassandra-init:
    image: cassandra:4.1
    container_name: taasim-cassandra-init
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./infra/config/cassandra/cassandra_schema.cql:/schema.cql
    entrypoint: ["cqlsh", "cassandra", "-f", "/schema.cql"]

  # 3. MINIO
  minio:
    image: minio/minio:latest
    container_name: taasim-minio
    ports:
      - "9002:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
  minio-init:
    image: minio/mc
    container_name: taasim-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 admin password123;
      mc mb myminio/raw --ignore-existing;
      mc mb myminio/curated --ignore-existing;
      mc mb myminio/mls --ignore-existing;
      mc mb myminio/kafka-archive --ignore-existing;
      exit 0;
      "    

  # 4. FLINK - Job Manager
  flink-jobmanager:
    build: 
      context: .
      dockerfile: infra/docker/Dockerfile.flink  # <-- Tells Docker to build your custom PyFlink image
    container_name: taasim-flink-jm
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
    volumes:
      - ./src/jobs:/opt/flink/jobs

  # 4b. FLINK - Task Manager
  flink-taskmanager:
    build: 
      context: .
      dockerfile: infra/docker/Dockerfile.flink  # <-- Use the same custom image here
    container_name: taasim-flink-tm
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 3
        taskmanager.memory.process.size: 2400m
        taskmanager.memory.task.off-heap.size: 128m
        taskmanager.memory.framework.off-heap.size: 256m
        taskmanager.memory.jvm-metaspace.size: 512m
    volumes:
      - ./src/jobs:/opt/flink/jobs

  # 5. SPARK - Master (official Apache image)
  spark-master:
    image: apache/spark:3.5.1
    container_name: taasim-spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_MASTER_HOST=spark-master
    volumes:
      - ./storage/jars:/storage/jars   # ← add

  # 5b. SPARK - Worker
  spark-worker:
    image: apache/spark:3.5.1
    container_name: taasim-spark-worker
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=1g
      - SPARK_WORKER_WEBUI_PORT=8081
    volumes:
      - ./storage/jars:/storage/jars   # ← add

  # 6. GRAFANA
  grafana:
    image: grafana/grafana:latest
    container_name: taasim-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=hadesarchitect-cassandra-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - cassandra
  # 7. KAFKA CONNECT (Custom image with S3 Sink Connector)
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.5.0
    container_name: taasim-kafka-connect
    depends_on:
      - kafka
      - minio
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: 'kafka:9092'
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: taasim-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: taasim-connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: taasim-connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: taasim-connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_INTERNAL_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_INTERNAL_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_REST_PORT: 8083
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
    # This command installs the S3 connector automatically on startup
    command: 
      - /bin/bash
      - -c 
      - |
        confluent-hub install --no-prompt confluentinc/kafka-connect-s3:10.5.1
        /etc/confluent/docker/run    

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: taasim-api
    ports:
      - "8001:8001"
    environment:
      - APP_ENV=production
      - API_PORT=8001
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_RAW_TRIPS_TOPIC=raw.trips
      - KAFKA_PROCESSED_TRIPS_TOPIC=processed.trips
      - KAFKA_API_GROUP_ID=api-stub-consumer
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password123
      - SPARK_MASTER_URL=spark://spark-master:7077   # ← add
      - SPARK_MODEL_PATH=s3a://mls/models/demand_v1/
      - SPARK_S3_ENDPOINT=http://minio:9000
      - SPARK_S3_ACCESS_KEY=admin
      - SPARK_S3_SECRET_KEY=password123
    depends_on:
      - kafka
      - minio
      - spark-master                                  # ← add
    networks:
      - default
    volumes:
      - ./storage/jars:/storage/jars   # ← add

  jupyter:
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.0  # ← correct registry + tag
    container_name: spark-notebook
    volumes:
      - ./:/home/jovyan/work
    ports:
      - "8888:8888"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - APACHE_SPARK_VERSION=3.5.1
      - JUPYTER_TOKEN=taasim123        # ← pick any password you want

      
    networks:
      - default
networks:
  default:
    name: taasim-network
volumes:
  minio_data:
  kafka_data:
  cassandra_data:    
  grafana_data: